        <script defer data-name="navigation-logic">
          document.addEventListener('DOMContentLoaded', function() {
            (function(){
              const navToggle = document.getElementById("navigationToggle")
              const navClose = document.getElementById("navigationClose")
              const navMenu = document.getElementById("navigationMenu")
              const body = document.body

              function openMenu() {
                navMenu.classList.add("is-active")
                navMenu.setAttribute("aria-hidden", "false")
                navToggle.setAttribute("aria-expanded", "true")
                body.style.overflow = "hidden"
              }

              function closeMenu() {
                navMenu.classList.remove("is-active")
                navMenu.setAttribute("aria-hidden", "true")
                navToggle.setAttribute("aria-expanded", "false")
                body.style.overflow = ""
              }

              navToggle.addEventListener("click", openMenu)
              navClose.addEventListener("click", closeMenu)

              const mobileLinks = navMenu.querySelectorAll(".navigation-mobile-link")
              mobileLinks.forEach((link) => {
                link.addEventListener("click", closeMenu)
              })

              document.addEventListener("keydown", (e) => {
                if (e.key === "Escape" && navMenu.classList.contains("is-active")) {
                  closeMenu()
                }
              })
            })()
          });
        </script>
